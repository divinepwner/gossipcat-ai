<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gossipcat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ═══════════════════════════════════════════════════
   GOSSIPCAT DASHBOARD — Design System v2
   ═══════════════════════════════════════════════════ */

:root {
  --bg: #08090e;
  --surface: #0e1017;
  --surface-raised: #131620;
  --surface-hover: #181c28;
  --border: rgba(255,255,255,0.05);
  --border-active: rgba(167,139,250,0.25);
  --text: #e4e6ef;
  --text-2: #a0a4b8;
  --text-3: #6c7089;
  --accent: #a78bfa;
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.12);
  --red: #f87171;
  --red-glow: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-glow: rgba(251,191,36,0.1);
  --blue: #60a5fa;
  --blue-glow: rgba(96,165,250,0.1);
  --body: 'Outfit', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
[hidden] { display: none !important; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
  isolation: isolate;
}

/* ── Atmosphere ─────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -2;
  background:
    radial-gradient(ellipse 60% 45% at 20% -8%, rgba(167,139,250,0.04) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 85% 105%, rgba(52,211,153,0.02) 0%, transparent 55%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: -1;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.012;
}

/* ── Scrollbar ──────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }

/* ── Accessibility ──────────────────────────────── */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── Auth Gate ──────────────────────────────────── */
.auth-gate {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  max-width: 380px; width: 100%;
}
.auth-card h1 { color: var(--accent); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
.auth-subtitle { color: var(--text-3); margin-bottom: 1.5rem; font-size: 0.875rem; }
.auth-card input {
  width: 100%; padding: 0.75rem 1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 0.875rem; font-family: var(--mono);
  margin-bottom: 1rem; outline: none;
}
.auth-card input:focus { border-color: var(--accent); }
.auth-card button {
  width: 100%; padding: 0.75rem;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 8px;
  font-weight: 600; font-size: 0.875rem; cursor: pointer;
  transition: opacity 0.15s;
}
.auth-card button:hover { opacity: 0.9; }
.auth-error { color: var(--red); font-size: 0.8rem; margin-top: 0.75rem; }

/* ── Topbar ─────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 50px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.logo {
  font-size: 16px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.02em; text-decoration: none;
}
.logo:hover { opacity: 0.9; }
.sep { color: var(--text-3); font-size: 12px; }
.crumb { color: var(--text-2); font-size: 13px; font-weight: 500; }
.nav-right { display: flex; align-items: center; gap: 14px; }
.ws-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3);
  background: var(--surface-raised); border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 7px;
}
.ws-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.ws-dot.online {
  background: var(--green);
  box-shadow: 0 0 8px rgba(52,211,153,0.5);
  animation: glow 2.5s ease-in-out infinite;
}
.ws-dot.offline { background: var(--red); }

@keyframes glow {
  0%, 100% { box-shadow: 0 0 4px rgba(52,211,153,0.3); }
  50% { box-shadow: 0 0 10px rgba(52,211,153,0.6); }
}

/* ── Main Content ───────────────────────────────── */
.page {
  max-width: 1200px; margin: 0 auto;
  padding: 24px 32px;
  height: calc(100vh - 50px); overflow-y: auto;
}

/* ── Section Headers ────────────────────────────── */
.section { margin-bottom: 28px; }
.sh {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.sh-left { display: flex; align-items: center; gap: 10px; }
.sh-title { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
.sh-count {
  font-size: 10px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); background: var(--surface-raised);
  padding: 2px 8px; border-radius: 4px;
}
.sh-action {
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); cursor: pointer;
  transition: color 0.15s; letter-spacing: 0.02em;
  background: none; border: none;
}
.sh-action:hover { color: var(--accent); }

/* ── Metric Cards ───────────────────────────────── */
.metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.mc {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px; transition: border-color 0.2s;
  position: relative; overflow: hidden;
}
.mc:hover { border-color: var(--border-active); }
.mc::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--accent); opacity: 0; transition: opacity 0.2s;
}
.mc:hover::after { opacity: 0.4; }
.mc-row { display: flex; justify-content: space-between; align-items: flex-start; }
.mc-label {
  font-size: 11px; font-family: var(--mono); font-weight: 500;
  color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em;
}
.mc-val {
  font-family: var(--mono); font-size: 26px; font-weight: 600;
  letter-spacing: -0.04em; line-height: 1; margin-top: 5px;
}
.mc-detail { font-size: 12px; color: var(--text-3); margin-top: 5px; }
.mc-detail strong { font-weight: 600; }
.mc-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mc-icon svg { width: 20px; height: 20px; }

/* ── Agent Cards ────────────────────────────────── */
.agent-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.ag {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s; position: relative;
}
.ag:hover {
  border-color: var(--border-active); background: var(--surface-raised);
  transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}
.ag.idle { opacity: 0.35; }
.ag.idle:hover { opacity: 0.5; }
.ag::before {
  content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
  border-radius: 0 2px 2px 0; background: var(--card-color, var(--text-3));
  opacity: 0.5; transition: opacity 0.2s;
}
.ag:hover::before { opacity: 1; }
.ag-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.ag-name { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.ag-role { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.ag-status { display: flex; align-items: center; gap: 4px; font-size: 10px; font-family: var(--mono); font-weight: 500; }
.ag-dot { width: 6px; height: 6px; border-radius: 50%; }
.ag-metrics { display: flex; gap: 2px; }
.ag-m { flex: 1; background: var(--surface-raised); border-radius: 6px; padding: 7px 8px; text-align: center; }
.ag-m-val { font-family: var(--mono); font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
.ag-m-lbl { font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }

/* Overflow card */
.ag-more {
  background: var(--surface); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; min-height: 120px;
}
.ag-more:hover { border-color: var(--accent); background: var(--surface-raised); }
.ag-more-count { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--text-2); }
.ag-more-label { font-size: 12px; color: var(--text-3); }
.ag-more-avatars { display: flex; margin-bottom: 2px; }
.ag-more-pip {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-family: var(--mono); font-weight: 600;
  border: 1.5px solid var(--bg); margin-left: -6px;
}
.ag-more-pip:first-child { margin-left: 0; }

/* ── Charts ─────────────────────────────────────── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
.chart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.chart-title { font-size: 13px; font-weight: 600; }
.chart-legend { display: flex; gap: 12px; font-size: 10px; color: var(--text-3); font-family: var(--mono); }
.lg-dot { width: 8px; height: 3px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }
.chart-svg { width: 100%; display: block; }
.grid-ln { stroke: rgba(255,255,255,0.03); stroke-width: 0.5; }
.ax-txt { fill: var(--text-3); font-family: var(--mono); font-size: 9px; }

/* ── Panels ─────────────────────────────────────── */
.panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; display: flex; flex-direction: column;
}
.panel-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.panel-title { font-size: 13px; font-weight: 600; }
.panel-body { flex: 1; overflow-y: auto; max-height: 280px; }

/* ── Feed Rows ──────────────────────────────────── */
.fr {
  display: flex; align-items: baseline; gap: 10px;
  padding: 9px 16px; font-size: 13px; color: var(--text-2);
  transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02);
}
.fr:last-child { border-bottom: none; }
.fr:hover { background: rgba(255,255,255,0.012); }
.fr-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; position: relative; top: 1px; }
.fr-time { font-family: var(--mono); font-size: 11px; color: var(--text-3); min-width: 36px; }
.fr-agent { color: var(--accent); font-weight: 500; }
.fr-dur { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-left: 3px; }

/* ── Consensus Rows ─────────────────────────────── */
.cr {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; font-size: 13px; color: var(--text-2);
  cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.cr:last-child { border-bottom: none; }
.cr:hover { background: rgba(255,255,255,0.012); }
.cr-time { font-family: var(--mono); font-size: 11px; color: var(--text-3); min-width: 36px; }
.cr-info { flex: 1; }
.cr-pills { display: flex; gap: 3px; }

/* ── Pills ──────────────────────────────────────── */
.pill {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10.5px; font-family: var(--mono); font-weight: 600;
  padding: 3px 7px; border-radius: 5px;
}
.pill-g { background: var(--green-glow); color: var(--green); }
.pill-r { background: var(--red-glow); color: var(--red); }
.pill-y { background: var(--amber-glow); color: var(--amber); }

/* ── Signal Rows ────────────────────────────────── */
.sig-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; font-size: 12px; color: var(--text-2);
  transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02);
}
.sig-row:last-child { border-bottom: none; }
.sig-row:hover { background: rgba(255,255,255,0.012); }
.sig-type {
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  padding: 2px 7px; border-radius: 4px; min-width: 64px; text-align: center; flex-shrink: 0;
}
.sig-type.agreement { background: var(--green-glow); color: var(--green); }
.sig-type.hallucination { background: var(--red-glow); color: var(--red); }
.sig-type.unique { background: var(--blue-glow); color: var(--blue); }
.sig-type.disagreement { background: var(--amber-glow); color: var(--amber); }
.sig-agent { color: var(--accent); font-weight: 500; font-size: 12px; }
.sig-arrow { color: var(--text-3); font-size: 10px; }
.sig-finding { flex: 1; color: var(--text-3); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Knowledge ──────────────────────────────────── */
.know-agents { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; }
.ka {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; cursor: pointer; transition: all 0.15s;
  flex: 1; min-width: 200px;
}
.ka:hover { border-color: var(--border-active); background: var(--surface-hover); }
.ka-avatar {
  width: 24px; height: 24px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-family: var(--mono); font-weight: 600; flex-shrink: 0;
}
.ka-info { flex: 1; min-width: 0; }
.ka-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ka-stats { font-size: 10px; color: var(--text-3); font-family: var(--mono); }

.learn-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; font-size: 12px;
  transition: background 0.1s; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer;
}
.learn-row:last-child { border-bottom: none; }
.learn-row:hover { background: rgba(255,255,255,0.012); }
.learn-avatar {
  width: 20px; height: 20px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-family: var(--mono); font-weight: 600; flex-shrink: 0;
}
.learn-text { flex: 1; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.learn-type { font-size: 9px; font-family: var(--mono); color: var(--text-3); flex-shrink: 0; }
.learn-when { font-size: 10px; font-family: var(--mono); color: var(--text-3); flex-shrink: 0; min-width: 32px; }

/* ── Memory Browser (detail view) ───────────────── */
.memory-md { padding: 1rem; font-size: 13px; line-height: 1.6; color: var(--text-2); }
.memory-md h1 { font-size: 1.125rem; color: var(--text); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h2 { font-size: 0.9375rem; color: var(--text); margin: 1rem 0 0.5rem; font-weight: 600; }
.memory-md h3 { font-size: 0.8125rem; color: var(--text); margin: 0.75rem 0 0.375rem; font-weight: 600; }
.memory-md ul { padding-left: 1.25rem; margin: 0.375rem 0; }
.memory-md li { margin: 0.25rem 0; }
.memory-md a { color: var(--accent); text-decoration: none; }
.memory-md a:hover { text-decoration: underline; }
.memory-md strong { color: var(--text); }
.memory-md code { background: rgba(255,255,255,0.06); padding: 0.125rem 0.375rem; border-radius: 3px; font-size: 0.8rem; font-family: var(--mono); }
.memory-md p { margin: 0.375rem 0; }
.memory-code { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.75rem; font-size: 0.75rem; font-family: var(--mono); overflow-x: auto; margin: 0.5rem 0; }
.memory-file { border-bottom: 1px solid rgba(255,255,255,0.04); padding: 0.25rem 0; }
.memory-file:last-child { border-bottom: none; }
.memory-file.cognitive { border-left: 2px solid var(--accent); padding-left: 0.75rem; }
.memory-file-header { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.375rem 0; font-size: 13px; }
.memory-file-header:hover { color: var(--accent); }
.memory-filename { font-family: var(--mono); color: var(--text); font-size: 0.75rem; }
.memory-desc { color: var(--text-3); font-size: 0.75rem; }
.memory-file-content {
  background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.75rem;
  font-size: 0.7rem; font-family: var(--mono); line-height: 1.5;
  overflow-x: auto; white-space: pre-wrap; color: var(--text-2);
  margin: 0.25rem 0 0.5rem;
}

/* ── Detail Views ───────────────────────────────── */
.detail-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-avatar {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-family: var(--mono); font-weight: 600;
}
.detail-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.detail-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }
.detail-stats { display: flex; gap: 10px; margin-bottom: 24px; }
.detail-stat {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; flex: 1; text-align: center;
}
.detail-stat-val { font-family: var(--mono); font-size: 20px; font-weight: 600; }
.detail-stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* Filter buttons */
.filters { display: flex; gap: 4px; margin-bottom: 14px; }
.filter-btn {
  background: var(--surface-raised); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 12px; font-size: 12px; font-family: var(--mono); color: var(--text-3);
  cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: var(--text); border-color: var(--border-active); }
.filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(167,139,250,0.08); }

/* Search */
.search-input {
  width: 100%; padding: 8px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: var(--body);
  margin-bottom: 14px; outline: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-3); }

/* ── Layout Grids ───────────────────────────────── */
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.know-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Empty / Loading / Error States ─────────────── */
.empty-state { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }
.loading { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }

/* ── Animations ─────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.section:nth-child(1) { animation: fadeUp 0.35s ease-out; }
.section:nth-child(2) { animation: fadeUp 0.35s ease-out 0.04s both; }
.section:nth-child(3) { animation: fadeUp 0.35s ease-out 0.08s both; }
.section:nth-child(4) { animation: fadeUp 0.35s ease-out 0.12s both; }
.section:nth-child(5) { animation: fadeUp 0.35s ease-out 0.16s both; }

/* ── Responsive ─────────────────────────────────── */
@media (max-width: 1200px) {

// packages/dashboard/src/app.js

// ── Shared Utilities ────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

// ── API Helper ──────────────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch(`/dashboard/api/${path}`, { credentials: 'include' });
  if (res.status === 401) {
    throw new Error('Unauthorized');
  }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.error || `API error: ${res.status}`);
  }
  return res.json();
}

// ── Auth ─────────────────────────────────────────────────────────────────────
const authGate = document.getElementById('auth-gate');
const dashboard = document.getElementById('dashboard');
const authForm = document.getElementById('auth-form');
const authError = document.getElementById('auth-error');

function showAuth() {
  authGate.hidden = false;
  dashboard.hidden = true;
  // Close WebSocket if open
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
}

function showDashboard() {
  authGate.hidden = true;
  dashboard.hidden = false;
  connectWs();
  loadTab('overview');
}

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const submitBtn = authForm.querySelector('button');
  submitBtn.disabled = true;
  const key = document.getElementById('auth-key').value.trim();
  try {
    const res = await fetch('/dashboard/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key }),
      credentials: 'include',
    });
    if (!res.ok) {
      authError.hidden = false;
      return;
    }
    // Verify the cookie was actually set by making an authenticated call
    const verify = await fetch('/dashboard/api/overview', { credentials: 'include' });
    if (verify.ok) {
      authError.hidden = true;
      showDashboard();
    } else {
      authError.hidden = false;
    }
  } catch {
    authError.hidden = false;
  } finally {
    submitBtn.disabled = false;
  }
});

// ── Tab Routing ──────────────────────────────────────────────────────────────
const tabs = document.querySelectorAll('.nav-tab');
const tabContents = document.querySelectorAll('.tab-content');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    if (tab.disabled) return;
    tabs.forEach(t => t.classList.remove('active'));
    tabContents.forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    loadTab(tab.dataset.tab);
  });
});

// ── WebSocket ────────────────────────────────────────────────────────────────
let ws = null;
const wsStatus = document.getElementById('ws-status');
const wsLabel = document.getElementById('ws-label');
const eventListeners = new Set();

function onDashboardEvent(fn) { eventListeners.add(fn); }
function offDashboardEvent(fn) { eventListeners.delete(fn); }

function connectWs() {
  if (ws) return; // already connected
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/dashboard/ws`);

  ws.onopen = () => {
    wsStatus.className = 'status-dot online';
    wsLabel.textContent = 'Connected';
  };

  ws.onclose = () => {
    wsStatus.className = 'status-dot offline';
    wsLabel.textContent = 'Disconnected';
    ws = null;
    // Only reconnect if dashboard is visible (not on auth gate)
    if (!dashboard.hidden) {
      setTimeout(connectWs, 3000);
    }
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      for (const fn of eventListeners) fn(event);
    } catch { /* ignore */ }
  };
}

// ── Tab Loading ──────────────────────────────────────────────────────────────
async function loadTab(name) {
  // Clean up overview event handler when switching away
  if (name !== 'overview' && typeof _overviewEventHandler !== 'undefined' && _overviewEventHandler) {
    offDashboardEvent(_overviewEventHandler);
    _overviewEventHandler = null;
  }
  switch (name) {
    case 'overview': return renderOverview();
    case 'agents': return renderAgents();
    case 'tasks': return renderTasks();
    case 'skills': return renderSkills();
    case 'consensus': return renderConsensus();
    case 'memory': return renderMemory();
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
// Check if already authenticated (valid cookie from previous session)
api('overview').then(() => showDashboard()).catch(() => showAuth());

// Make helpers available to tab modules
window._dash = { api, onDashboardEvent, offDashboardEvent };

// packages/dashboard/src/tabs/overview.js

let _overviewEventHandler = null;

async function renderOverview() {
  if (_overviewEventHandler) {
    window._dash.offDashboardEvent(_overviewEventHandler);
    _overviewEventHandler = null;
  }

  const container = document.getElementById('tab-overview');
  container.innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const [overview, agents, tasksData] = await Promise.all([
      window._dash.api('overview'),
      window._dash.api('agents'),
      window._dash.api('tasks'),
    ]);

    const successRate = overview.tasksCompleted + overview.tasksFailed > 0
      ? ((overview.tasksCompleted / (overview.tasksCompleted + overview.tasksFailed)) * 100).toFixed(0)
      : '—';

    container.innerHTML = `
      <div class="stat-cards">
        <div class="stat-card">
          <div class="label">Team</div>
          <div class="value">${overview.agentsOnline}</div>
          <div class="detail">${overview.relayCount} relay, ${overview.nativeCount} native</div>
        </div>
        <div class="stat-card">
          <div class="label">Tasks</div>
          <div class="value">${overview.tasksCompleted + overview.tasksFailed}</div>
          <div class="detail">${successRate}% success${overview.avgDurationMs > 0 ? ', ' + (overview.avgDurationMs / 1000).toFixed(1) + 's avg' : ''}</div>
        </div>
        <div class="stat-card">
          <div class="label">Consensus</div>
          <div class="value">${overview.totalSignals}</div>
          <div class="detail">${overview.consensusRuns} runs, ${overview.confirmedFindings} confirmed</div>
        </div>
      </div>

      <div class="panels">
        <div class="panel">
          <div class="panel-title">Agent Performance</div>
          <div id="agent-scores">
            ${agents.length === 0 ? '<div class="empty-state">No agents configured</div>' :
              agents
                .sort((a, b) => b.scores.dispatchWeight - a.scores.dispatchWeight)
                .map(a => {
                  const s = a.scores;
                  return `
                  <div class="agent-score-card">
                    <div class="agent-score-header">
                      <span class="agent-score-name">
                        ${escapeHtml(a.id)}
                        ${a.native ? '<span class="agent-badge">native</span>' : ''}
                      </span>
                      <span class="weight-badge">${s.dispatchWeight.toFixed(2)}</span>
                    </div>
                    <div class="agent-score-metrics">
                      <div class="metric">
                        <div class="metric-bar"><div class="bar-fill accuracy" style="width:${(s.accuracy * 100).toFixed(0)}%"></div></div>
                        <span class="metric-val">${(s.accuracy * 100).toFixed(0)}%</span>
                        <span class="metric-lbl">accuracy</span>
                      </div>
                      <div class="metric">
                        <div class="metric-bar"><div class="bar-fill uniqueness" style="width:${(s.uniqueness * 100).toFixed(0)}%"></div></div>
                        <span class="metric-val">${(s.uniqueness * 100).toFixed(0)}%</span>
                        <span class="metric-lbl">unique</span>
                      </div>
                    </div>
                    <div class="agent-score-stats">
                      <span>${s.signals} signals</span>
                      <span>${s.agreements} agrees</span>
                      <span>${s.disagreements} disagrees</span>
                      ${s.hallucinations > 0 ? `<span class="halluc">${s.hallucinations} halluc.</span>` : ''}
                    </div>
                  </div>`;
                }).join('')}
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Recent Activity</div>
          <div id="activity-timeline" class="timeline">
            ${tasksData.tasks.length === 0
              ? '<div class="empty-state">No tasks yet</div>'
              : tasksData.tasks.slice(0, 20).map(t => {
                  const time = new Date(t.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                  const color = t.status === 'completed' ? 'green' : t.status === 'failed' ? 'red' : 'purple';
                  const dur = t.duration > 0 ? ` (${(t.duration / 1000).toFixed(1)}s)` : '';
                  // Extract first sentence or truncate cleanly
                  const desc = t.task.replace(/\n.*/s, '').slice(0, 60);
                  return `<div class="timeline-entry">
                    <div class="timeline-dot ${color}"></div>
                    <div class="timeline-time">${time}</div>
                    <div class="timeline-text"><span class="timeline-agent">${escapeHtml(t.agentId)}</span>${dur} — ${escapeHtml(desc)}</div>
                  </div>`;
                }).join('')}
          </div>
        </div>
      </div>
    `;

    // Wire up live WebSocket events
    const timeline = document.getElementById('activity-timeline');
    _overviewEventHandler = (event) => {
      const colors = {
        task_completed: 'green', consensus_complete: 'green',
        task_dispatched: 'purple', agent_connected: 'purple', agent_disconnected: 'purple',
        skill_changed: 'yellow', consensus_started: 'yellow',
        task_failed: 'red',
      };
      const time = new Date(event.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const color = colors[event.type] || 'purple';
      const text = formatEvent(event);
      const entry = document.createElement('div');
      entry.className = 'timeline-entry';
      entry.innerHTML = `
        <div class="timeline-dot ${color}"></div>
        <div class="timeline-time">${time}</div>
        <div class="timeline-text"></div>
      `;
      entry.querySelector('.timeline-text').textContent = text;
      // Remove "No tasks yet" placeholder
      const placeholder = timeline.querySelector('.empty-state');
      if (placeholder) placeholder.remove();
      timeline.prepend(entry);
      while (timeline.children.length > 100) timeline.removeChild(timeline.lastChild);
    };
    window._dash.onDashboardEvent(_overviewEventHandler);
  } catch (err) {
    container.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

function formatEvent(event) {
  const d = event.data || {};
  switch (event.type) {
    case 'task_dispatched': return `Task dispatched to ${d.agentId || '?'}`;
    case 'task_completed': return `Task completed by ${d.agentId || '?'}`;
    case 'task_failed': return `Task failed on ${d.agentId || '?'}`;
    case 'consensus_started': return `Consensus started (${d.agentCount || '?'} agents)`;
    case 'consensus_complete': return `Consensus complete — ${d.confirmed || 0} confirmed`;
    case 'agent_connected': return `${d.agentId || '?'} connected`;
    case 'agent_disconnected': return `${d.agentId || '?'} disconnected`;
    case 'skill_changed': return `Skill ${d.skill || '?'} toggled for ${d.agentId || '?'}`;
    default: return event.type;
  }
}

// packages/dashboard/src/tabs/tasks.js

async function renderTasks() {
  const container = document.getElementById('tab-tasks');
  container.innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const data = await window._dash.api('tasks');

    if (data.tasks.length === 0) {
      container.innerHTML = '<div class="empty-state">No tasks yet. Dispatch agents to generate task history.</div>';
      return;
    }

    container.innerHTML = `
      <div class="panel" style="margin-bottom:1rem">
        <div class="panel-title">Task History (${data.total} total, showing last ${data.tasks.length})</div>
        <div class="tasks-list">
          ${data.tasks.map(t => {
            const time = new Date(t.timestamp).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const dur = t.duration > 0 ? `${(t.duration / 1000).toFixed(1)}s` : '—';
            const statusCls = t.status === 'completed' ? 'confirmed' : t.status === 'failed' ? 'disputed' : 'unverified';
            return `

// packages/dashboard/src/tabs/skills.js

async function renderSkills() {
  const container = document.getElementById('tab-skills');
  container.innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const [skillsData, agents] = await Promise.all([
      window._dash.api('skills'),
      window._dash.api('agents'),
    ]);

    const index = skillsData.index;
    const agentIds = agents.map(a => a.id);

    // Collect all unique skill names across all agents
    const allSkills = new Set();
    for (const agentId of Object.keys(index)) {
      for (const skill of Object.keys(index[agentId])) {
        allSkills.add(skill);
      }
    }
    const skillNames = [...allSkills].sort();

    if (agentIds.length === 0) {
      container.innerHTML = '<div class="empty-state">No agents configured. Run gossip_setup to create your team.</div>';
      return;
    }

    if (skillNames.length === 0) {
      container.innerHTML = '<div class="empty-state">No skills bound yet. Skills are assigned when agents run tasks.</div>';
      return;
    }

    container.innerHTML = `
      <div class="panels">
        <div class="panel" style="grid-column:1/-1">
          <div class="panel-title">Skill Index</div>
          <div class="skills-grid-wrap">
            <table class="skills-grid">
              <thead>
                <tr>
                  <th class="skills-grid-corner"></th>
                  ${agentIds.map(id => `<th class="skills-grid-agent">${escapeHtml(id)}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${skillNames.map(skill => `
                  <tr>
                    <td class="skills-grid-skill">${escapeHtml(skill)}</td>
                    ${agentIds.map(agentId => {
                      const slot = index[agentId]?.[skill];
                      if (!slot) return '<td class="skills-grid-cell unbound"></td>';
                      const cls = slot.enabled ? 'enabled' : 'disabled';
                      return `<td class="skills-grid-cell ${cls}" data-agent="${escapeHtml(agentId)}" data-skill="${escapeHtml(skill)}" data-enabled="${slot.enabled}">${slot.enabled ? '&#10003;' : '&#10005;'}</td>`;
                    }).join('')}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    // Click handlers for toggle cells
    container.querySelectorAll('.skills-grid-cell[data-agent]').forEach(cell => {
      cell.addEventListener('click', async () => {
        const agentId = cell.dataset.agent;
        const skill = cell.dataset.skill;
        const currentlyEnabled = cell.dataset.enabled === 'true';
        const newEnabled = !currentlyEnabled;

        cell.classList.add('toggling');
        try {
          const res = await fetch('/dashboard/api/skills/bind', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agent_id: agentId, skill, enabled: newEnabled }),
            credentials: 'include',
          });
          const result = await res.json();
          if (result.success) {
            cell.dataset.enabled = String(newEnabled);
            cell.className = `skills-grid-cell ${newEnabled ? 'enabled' : 'disabled'}`;
            cell.innerHTML = newEnabled ? '&#10003;' : '&#10005;';
          } else {
            cell.title = result.error || 'Toggle failed';
            cell.style.outline = '2px solid var(--status-disputed)';
            setTimeout(() => { cell.style.outline = ''; cell.title = ''; }, 2000);
          }
        } catch {
          cell.style.outline = '2px solid var(--status-disputed)';
          setTimeout(() => { cell.style.outline = ''; }, 2000);
        }
        cell.classList.remove('toggling');
      });
    });
  } catch (err) {
    container.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

// packages/dashboard/src/tabs/consensus.js

async function renderConsensus() {
  const container = document.getElementById('tab-consensus');
  container.innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const data = await window._dash.api('consensus');

    if (data.runs.length === 0) {
      container.innerHTML = '<div class="empty-state">No consensus runs yet. Run gossip_dispatch_consensus to generate data.</div>';
      return;
    }

    container.innerHTML = `
      <div class="stat-cards" style="margin-bottom:1.5rem">
        <div class="stat-card">
          <div class="label">Runs</div>
          <div class="value">${data.runs.length}</div>
        </div>
        <div class="stat-card">
          <div class="label">Signals</div>
          <div class="value">${data.totalSignals}</div>
        </div>
      </div>
      <div class="consensus-runs">${data.runs.map(renderConsensusRun).join('')}</div>
    `;

    container.querySelectorAll('.consensus-run-header').forEach(header => {
      header.addEventListener('click', () => {
        const body = header.nextElementSibling;
        body.hidden = !body.hidden;
        header.querySelector('.expand-icon').textContent = body.hidden ? '+' : '-';
      });
    });
  } catch (err) {
    container.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

function renderConsensusRun(run) {
  const c = run.counts;
  const time = new Date(run.timestamp).toLocaleString([], {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
  const total = c.agreement + c.disagreement + c.unverified + c.unique + c.hallucination + c.new;

  const signalRows = run.signals.map(s => {
    const colorClass = {
      agreement: 'confirmed', disagreement: 'disputed',
      unverified: 'unverified', unique_confirmed: 'confirmed',
      unique_unconfirmed: 'unique', hallucination_caught: 'disputed',
      new_finding: 'new', consensus_verified: 'confirmed',
      category_confirmed: 'confirmed',
    }[s.signal] || 'unique';

    return `
      <div class="consensus-signal">
        <span class="consensus-tag ${colorClass}">${escapeHtml(s.signal.replace(/_/g, ' '))}</span>
        <span class="consensus-agent">${escapeHtml(s.agentId)}</span>
        ${s.counterpartId ? `<span class="consensus-arrow">&rarr;</span><span class="consensus-agent">${escapeHtml(s.counterpartId)}</span>` : ''}
        ${s.evidence ? `<div class="consensus-evidence">${escapeHtml(s.evidence.slice(0, 200))}${s.evidence.length > 200 ? '...' : ''}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="consensus-run">
      <div class="consensus-run-header">
        <span class="expand-icon">+</span>
        <div class="consensus-run-info">
          <span class="consensus-task-id">${escapeHtml(run.taskId)}</span>
          <span class="consensus-meta">${run.agents.length} agents &middot; ${total} signals &middot; ${time}</span>
        </div>
        <div class="consensus-counts">
          ${c.agreement ? `<span class="consensus-tag confirmed">${c.agreement}</span>` : ''}
          ${c.disagreement ? `<span class="consensus-tag disputed">${c.disagreement}</span>` : ''}
          ${c.unverified ? `<span class="consensus-tag unverified">${c.unverified}</span>` : ''}
          ${c.hallucination ? `<span class="consensus-tag disputed">${c.hallucination} H</span>` : ''}
        </div>
      </div>
      <div class="consensus-run-body" hidden>${signalRows}</div>
    </div>`;
}

async function renderMemory() {
  const container = document.getElementById('tab-memory');
  container.innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const agents = await window._dash.api('agents');

    if (agents.length === 0) {
      container.innerHTML = '<div class="empty-state">No agents configured.</div>';
      return;
    }

    container.innerHTML = `
      <div class="memory-agent-pills">
        <button class="memory-agent-pill" data-agent="_project">
          _project <span class="agent-badge">shared</span>
        </button>
        ${agents.map(a => `<button class="memory-agent-pill" data-agent="${escapeHtml(a.id)}">
          ${escapeHtml(a.id)}
          ${a.native ? '<span class="agent-badge">native</span>' : ''}
        </button>`).join('')}
      </div>
      <div id="memory-content"><div class="empty-state">Select an agent above</div></div>
    `;

    container.querySelectorAll('.memory-agent-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        container.querySelectorAll('.memory-agent-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        loadAgentMemory(pill.dataset.agent);
      });
    });
  } catch (err) {
    container.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

async function loadAgentMemory(agentId) {
  const content = document.getElementById('memory-content');
  content.innerHTML = '<div class="empty-state">Loading...</div>';

  try {
    const data = await window._dash.api(`memory/${encodeURIComponent(agentId)}`);

    const sections = [];

    // Build knowledge lookup for inline expansion
    const knowledgeMap = {};
    for (const k of data.knowledge) {
      knowledgeMap[k.filename] = k;
    }

    // MEMORY.md index
    if (data.index) {
      sections.push(`
        <div class="panel">
          <div class="panel-title">MEMORY.md</div>
          <div class="memory-md" id="memory-md-content">${renderMarkdown(data.index)}</div>
        </div>
      `);
    }

    // Knowledge files
    if (data.knowledge.length > 0) {
      const files = data.knowledge.map(k => {
        const desc = k.frontmatter.description || k.frontmatter.name || k.filename;
        const isCognitive = k.content.includes('You reviewed') || k.content.includes('cognitive');
        return `
          <div class="memory-file ${isCognitive ? 'cognitive' : ''}">
            <div class="memory-file-header" onclick="this.nextElementSibling.hidden = !this.nextElementSibling.hidden">
              <span class="expand-icon">+</span>
              <span class="memory-filename">${escapeHtml(k.filename)}</span>
              <span class="memory-desc">${escapeHtml(desc)}</span>
              ${isCognitive ? '<span class="agent-badge">cognitive</span>' : ''}
            </div>
            <pre class="memory-file-content" hidden>${escapeHtml(k.content)}</pre>
          </div>
        `;
      }).join('');

      sections.push(`
        <div class="panel">
          <div class="panel-title">Knowledge Files (${data.knowledge.length})</div>
          ${files}
        </div>
      `);
    }

    // Tasks
    if (data.tasks.length > 0) {
      const rows = data.tasks.slice(-50).reverse().map(t => `
        <tr>
          <td class="memory-task-date">${t.timestamp ? new Date(t.timestamp).toLocaleDateString() : '-'}</td>
          <td>${escapeHtml(String(t.task || t.result || '-').slice(0, 120))}</td>
          <td>${t.importance != null ? t.importance : '-'}</td>
        </tr>
      `).join('');

      sections.push(`
        <div class="panel">
          <div class="panel-title">Recent Tasks (${data.tasks.length})</div>
          <div class="skills-grid-wrap">
            <table class="skills-grid">
              <thead><tr><th>Date</th><th>Summary</th><th>Imp.</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `);
    }

    if (sections.length === 0) {
      content.innerHTML = '<div class="empty-state">No memory data for this agent.</div>';
    } else {
      content.innerHTML = `<div class="memory-panels">${sections.join('')}</div>`;

      // Wire up knowledge/ links in MEMORY.md to expand inline
      const mdContent = document.getElementById('memory-md-content');
      if (mdContent) {
        mdContent.querySelectorAll('a').forEach(link => {
          const href = link.getAttribute('href');
          // Prevent all local links from navigating
          if (href && !href.startsWith('http')) {
            link.href = '#';
          }
          if (!href || !href.startsWith('knowledge/')) return;
          const filename = href.replace('knowledge/', '');
          const entry = knowledgeMap[filename];
          if (!entry) { link.style.opacity = '0.5'; return; }
          link.style.cursor = 'pointer';
          link.addEventListener('click', (e) => {
            e.preventDefault();
            let detail = link.nextElementSibling;
            if (detail && detail.classList.contains('memory-inline-detail')) {
              detail.hidden = !detail.hidden;
              return;
            }
            detail = document.createElement('pre');
            detail.className = 'memory-file-content memory-inline-detail';
            detail.textContent = entry.content;
            link.parentNode.insertBefore(detail, link.nextSibling);
          });
        });
      }
    }
  } catch (err) {
    content.innerHTML = `<div class="empty-state">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

function renderMarkdown(md) {
  // Extract code blocks BEFORE escaping to prevent double-encoding
  const codeBlocks = [];
  let processed = md.replace(/```[\s\S]*?```/g, (m) => {
    const content = m.slice(3, -3).replace(/^[^\n]*\n/, ''); // strip language hint
    const placeholder = `\x00CODE${codeBlocks.length}\x00`;
    codeBlocks.push('<pre class="memory-code">' + escapeHtml(content) + '</pre>');
    return placeholder;
  });

  const inlineCodes = [];
  processed = processed.replace(/`([^`]+)`/g, (_, code) => {
    const placeholder = `\x00INLINE${inlineCodes.length}\x00`;
    inlineCodes.push('<code>' + escapeHtml(code) + '</code>');
    return placeholder;
  });

  // Now escape the rest
  let html = escapeHtml(processed);

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Links: [text](url) — only allow safe schemes
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
    if (/^(https?:\/\/|knowledge\/|#)/.test(url)) return `<a href="${url}">${text}</a>`;
    return text; // strip unsafe links (javascript:, data:, etc.)
  });

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs: double newlines
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs around block elements
  html = html.replace(/<p>\s*(<(?:h[1-4]|ul|pre|li)[^>]*>)/g, '$1');
  html = html.replace(/(<\/(?:h[1-4]|ul|pre|li)>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*<\/p>/g, '');

  // Restore code blocks and inline code from placeholders
  codeBlocks.forEach((block, i) => { html = html.replace(`\x00CODE${i}\x00`, block); });
  inlineCodes.forEach((code, i) => { html = html.replace(`\x00INLINE${i}\x00`, code); });

  return html;
}
